name: Next.js CI Build Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Removed the cache option so it doesn't crash looking for a lockfile

      - name: Install Tailwind v4 PostCSS Plugin
        run: npm install -D @tailwindcss/postcss autoprefixer postcss

      - name: Install Project Dependencies
        run: npm install

      - name: Run Production Build (Turbopack Verification)
        run: npm run build
