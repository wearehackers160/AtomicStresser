name: Next.js CI Build Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Debug Project Structure
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== Directory Contents ==="
          ls -la
          echo "=== Package.json Content ==="
          cat package.json || echo "No package.json in root!"

      - name: Install Tailwind v4 PostCSS Plugin
        run: npm install -D @tailwindcss/postcss autoprefixer postcss

      - name: Install Project Dependencies
        run: npm install

      - name: Run Production Build
        run: |
          # Try running npm build; if it fails because it's missing, call the next compiler directly
          npm run build || npx next build
